name: commitlint
on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  commitlint:
    uses: cffnpwr/actions/.github/workflows/commitlint.yaml@827d6803313793c29f98826d5d9c00e92da976cb
    with:
      config-file: commitlint.config.ts
    permissions:
      contents: read
